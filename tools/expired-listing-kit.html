    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Expired Listing Prospecting Kit | HomeEdge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0A1929;
            --bg-card: #132F4C;
            --bg-light: #1B3A57;
            --accent-cyan: #00E5FF;
            --accent-blue: #1565C0;
            --accent-gold: #FFD54F;
            --text-primary: #FFFFFF;
            --text-secondary: #B0BEC5;
            --border: #37474F;
            --success: #66BB6A;
            --warning: #FFA726;
            --danger: #EF5350;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand {
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent-gold);
            margin-bottom: 8px;
        }

        .header-title {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        /* Form Card */
        .form-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px;
            margin-bottom: 32px;
            animation: fadeIn 0.5s ease-out 0.2s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--accent-cyan);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group label .required {
            color: var(--danger);
        }

        .form-group label .optional {
            color: var(--text-secondary);
            font-weight: 400;
            text-transform: none;
            font-size: 0.8rem;
        }

        input, textarea {
            background-color: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1rem;
            padding: 12px 16px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.15);
        }

        input::placeholder, textarea::placeholder {
            color: #546E7A;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .price-input-wrapper {
            position: relative;
        }

        .price-input-wrapper .prefix {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 1rem;
            font-weight: 600;
            pointer-events: none;
        }

        .price-input-wrapper input {
            padding-left: 30px;
        }

        .inline-group {
            display: flex;
            gap: 12px;
        }

        .inline-group .inline-field {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .inline-group .inline-field label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Buttons */
        .btn-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px 32px;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: inherit;
            color: var(--bg-dark);
            background: linear-gradient(135deg, var(--accent-cyan), #00B8D4);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            margin-top: 8px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(0, 229, 255, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-secondary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: inherit;
            color: var(--accent-cyan);
            background: transparent;
            border: 2px solid var(--accent-cyan);
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s;
        }

        .btn-secondary:hover {
            background-color: rgba(0, 229, 255, 0.1);
        }

        .btn-copy {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            font-size: 0.8rem;
            font-weight: 600;
            font-family: inherit;
            color: var(--accent-gold);
            background: rgba(255, 213, 79, 0.1);
            border: 1px solid rgba(255, 213, 79, 0.3);
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-copy:hover {
            background: rgba(255, 213, 79, 0.2);
        }

        .btn-copy.copied {
            color: var(--success);
            border-color: var(--success);
            background: rgba(102, 187, 106, 0.1);
        }

        /* Loading */
        .loading-overlay {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            text-align: center;
        }

        .loading-overlay.visible {
            display: flex;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--border);
            border-top-color: var(--accent-cyan);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .loading-dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
        }

        /* Output */
        .output-section {
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        .output-section.visible {
            display: block;
        }

        .output-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .output-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-light);
        }

        .output-card-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--accent-cyan);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .output-card-title .card-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        .output-card-body {
            padding: 20px;
            color: var(--text-primary);
            font-size: 0.95rem;
            line-height: 1.75;
        }

        .output-card-body p {
            margin-bottom: 12px;
        }

        .output-card-body p:last-child {
            margin-bottom: 0;
        }

        .output-card-body ul, .output-card-body ol {
            margin: 8px 0 12px 20px;
        }

        .output-card-body li {
            margin-bottom: 6px;
        }

        .output-card-body strong {
            color: var(--accent-gold);
        }

        .output-card-body h3, .output-card-body h4 {
            color: var(--accent-cyan);
            margin: 16px 0 8px;
        }

        .output-card-body h3:first-child, .output-card-body h4:first-child {
            margin-top: 0;
        }

        .output-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 8px;
            margin-bottom: 20px;
        }

        /* Error */
        .error-message {
            display: none;
            background: rgba(239, 83, 80, 0.1);
            border: 1px solid var(--danger);
            border-radius: 8px;
            padding: 16px 20px;
            color: var(--danger);
            text-align: center;
            margin-bottom: 24px;
        }

        .error-message.visible {
            display: block;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 40px 20px 20px;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        footer a {
            color: var(--accent-cyan);
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .header-title {
                font-size: 1.6rem;
            }

            .form-card {
                padding: 20px;
            }

            .inline-group {
                flex-direction: row;
            }

            .output-card-header {
                flex-wrap: wrap;
                gap: 8px;
            }

            .output-actions {
                flex-direction: column;
            }

            .btn-secondary,
            .btn-copy {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="brand">HomeEdge</div>
            <h1 class="header-title">Expired Listing Prospecting Kit</h1>
            <p class="header-subtitle">Turn expired listings into new clients</p>

        <!-- Form -->
        <div class="form-card">

                    <label for="brokerage">Brokerage</label>

                <div class="output-card-body" id="content-analysis"></div>

            <!-- Your New Strategy -->

                    <span class="output-card-title">
                        <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>

                    <button class="btn-copy" onclick="copySection('strategy', this)">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>

            <!-- Door-Knock Script -->

        <!-- Footer -->

    <script>
        const SECTION_KEYS = ['analysis', 'strategy', 'script', 'email', 'points'];

        const SECTION_HEADERS = {
            analysis: /why it didn'?t sell/i,
            strategy: /your new strategy|new strategy|strategy/i,
            script: /door[- ]?knock script|door[- ]?knock/i,
            email: /follow[- ]?up email/i,
            points: /key talking points|talking points/i
        };

        function buildPrompt() {
            const address = document.getElementById('address').value.trim();
            const cityState = document.getElementById('cityState').value.trim();
            const listPrice = document.getElementById('listPrice').value;
            const dom = document.getElementById('dom').value;
            const beds = document.getElementById('beds').value;
            const baths = document.getElementById('baths').value;
            const whyExpired = document.getElementById('whyExpired').value.trim();
            const agentName = document.getElementById('agentName').value.trim();
            const brokerage = document.getElementById('brokerage').value.trim();

            let prompt = `I need a complete expired listing prospecting kit for this property:\n\n`;
            prompt += `Property Address: ${address}`;
            if (cityState) prompt += `, ${cityState}`;
            prompt += `\n`;
            prompt += `Original List Price: $${Number(listPrice).toLocaleString()}\n`;
            if (dom) prompt += `Days on Market: ${dom}\n`;
            if (beds || baths) {
                prompt += `Bedrooms/Baths: ${beds || '?'}bd / ${baths || '?'}ba\n`;
            }
            if (whyExpired) {
                prompt += `Agent's theory on why it expired: ${whyExpired}\n`;
            }
            prompt += `\nAgent Name: ${agentName}`;
            if (brokerage) prompt += ` at ${brokerage}`;
            prompt += `\n`;

            prompt += `\nPlease provide your response in EXACTLY these 5 clearly labeled sections, using these exact headings:\n\n`;
            prompt += `## Why It Didn't Sell\n(Analyze the likely reasons this listing expired based on the price, days on market, and any details provided. Be specific and insightful.)\n\n`;
            prompt += `## Your New Strategy\n(Outline a concrete action plan for what the agent should do differently to sell this property. Include pricing strategy, marketing approach, staging suggestions, and timeline.)\n\n`;
            prompt += `## Door-Knock Script\n(Write a ready-to-use door-knock script the agent can use when visiting the homeowner. Make it conversational, empathetic, and focused on what went wrong and how the agent can fix it. Include the agent's name.)\n\n`;
            prompt += `## Follow-Up Email\n(Write a complete copy-paste-ready email with a subject line. The email should reference the visit, reinforce the value proposition, and include a clear call to action. Sign it from the agent.)\n\n`;
            prompt += `## Key Talking Points\n(Provide 5-7 bullet points the agent can reference during any conversation with the homeowner. These should be confident, data-informed, and persuasive.)\n`;

            return prompt;
        }

        function renderMarkdown(text) {
            let html = text
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                .replace(/^### (.+)$/gm, '<h4>$1</h4>')
                .replace(/^## (.+)$/gm, '<h3>$1</h3>')
                .replace(/^# (.+)$/gm, '<h3>$1</h3>')
                .replace(/^[-*] (.+)$/gm, '<li>$1</li>')
                .replace(/^(\d+)\. (.+)$/gm, '<li>$2</li>');

            // Wrap consecutive <li> tags in <ul>
            html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');

            // Convert remaining line breaks into paragraphs
            const blocks = html.split(/\n\s*\n/).filter(b => b.trim());
            html = blocks.map(block => {
                block = block.trim();
                if (block.startsWith('<h') || block.startsWith('<ul') || block.startsWith('<ol')) {
                    return block;
                }
                return `<p>${block.replace(/\n/g, '<br>')}</p>`;
            }).join('\n');

            return html;
        }

        function parseSections(text) {
            const sections = {
                analysis: '',
                strategy: '',
                script: '',
                email: '',
                points: ''
            };

            // Split on ## headings
            const parts = text.split(/^##\s+/m);

            for (const part of parts) {
                if (!part.trim()) continue;

                const firstLine = part.split('\n')[0].trim();
                const content = part.substring(firstLine.length).trim();

                for (const [key, regex] of Object.entries(SECTION_HEADERS)) {
                    if (regex.test(firstLine)) {
                        sections[key] = content;
                        break;
                    }
                }
            }

            // Fallback: if we didn't parse well, try splitting on numbered sections or bold headers
            const hasContent = Object.values(sections).some(v => v.trim().length > 0);
            if (!hasContent) {
                // Try bold header pattern: **Why It Didn't Sell**
                const boldParts = text.split(/\*\*([^*]+)\*\*/);
                for (let i = 1; i < boldParts.length; i += 2) {
                    const heading = boldParts[i];
                    const content = (boldParts[i + 1] || '').trim();
                    for (const [key, regex] of Object.entries(SECTION_HEADERS)) {
                        if (regex.test(heading) && !sections[key]) {
                            sections[key] = content;
                            break;
                        }
                    }
                }
            }

            // Last resort: if still empty, put everything in analysis
            const stillEmpty = Object.values(sections).every(v => v.trim().length === 0);
            if (stillEmpty) {
                sections.analysis = text;
            }

            return sections;
        }

        function extractText(data) {
            if (typeof data === 'string') return data;
            if (data.reply) return data.reply;
            if (data.response) return data.response;
            if (data.content) {
                return typeof data.content === 'string'
                    ? data.content
                    : (data.content[0]?.text || JSON.stringify(data.content));
            }
            if (data.choices?.[0]?.message?.content) return data.choices[0].message.content;
            if (data.result) return data.result;
            return JSON.stringify(data);
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.classList.add('visible');
        }

        function hideError() {
            document.getElementById('errorMsg').classList.remove('visible');
        }

        function validateForm() {
            const address = document.getElementById('address').value.trim();
            const listPrice = document.getElementById('listPrice').value;
            const agentName = document.getElementById('agentName').value.trim();

            if (!address) {
                showError('Please enter a property address.');
                return false;
            }
            if (!listPrice) {
                showError('Please enter the original list price.');
                return false;
            }
            if (!agentName) {
                showError('Please enter your name.');
                return false;
            }
            return true;
        }

        async function generateKit() {
            hideError();
            if (!validateForm()) return;

            const btn = document.getElementById('generateBtn');
            const loading = document.getElementById('loading');
            const output = document.getElementById('output');

            btn.disabled = true;
            output.classList.remove('visible');
            loading.classList.add('visible');

            const prompt = buildPrompt();
            const agentName = document.getElementById('agentName').value.trim();
            const brokerage = document.getElementById('brokerage').value.trim();

            try {
                const response = await fetch('https://homeedge-chat.moltmind.workers.dev/tool', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: [{ role: 'user', content: prompt }],
                        toolType: 'expiredListing',
                        context: {
                            agentName: agentName || undefined,
                            company: brokerage || undefined
                        }
                    })
                });

                if (!response.ok) {
                    throw new Error(`Server returned ${response.status}`);
                }

                const data = await response.json();
                const text = extractText(data);
                const sections = parseSections(text);

                for (const key of SECTION_KEYS) {
                    const el = document.getElementById(`content-${key}`);
                    if (sections[key]) {
                        el.innerHTML = renderMarkdown(sections[key]);
                    } else {
                        el.innerHTML = '<p style="color: var(--text-secondary);">No content generated for this section.</p>';
                    }
                }

                loading.classList.remove('visible');
                output.classList.add('visible');
            } catch (err) {
                loading.classList.remove('visible');
                showError('Could not generate prospecting kit. Please try again. (' + err.message + ')');
            } finally {
                btn.disabled = false;
            }
        }

        function copySection(sectionKey, btn) {
            const el = document.getElementById(`content-${sectionKey}`);
            const text = el.innerText;
            copyToClipboard(text, btn);
        }

        function copyToClipboard(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                markCopied(btn);
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                markCopied(btn);
            });
        }

        function markCopied(btn) {
            const original = btn.innerHTML;
            btn.classList.add('copied');
            btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Copied!';
            setTimeout(() => {
                btn.classList.remove('copied');
                btn.innerHTML = original;
            }, 2000);
        }
    </script>
</body>
