    <script>
    const STORAGE_KEY = 'homeedge_leads';
    const WORKER_URL = 'https://homeedge-chat.moltmind.workers.dev';
    let currentFilter = 'All';
    let searchTerm = '';
    let _isAuthenticated = false;
    let _leadsCache = [];

    const DEMO_LEADS = [
      {id:'d1',name:'Jennifer Walsh',phone:'(555) 234-5678',email:'jennifer@email.com',address:'742 Oakwood Dr',city:'Springfield',state:'IL',value:'$385,000',source:'AI Chatbot',status:'New',notes:'Interested in selling, wants spring listing',date:'2026-03-28'},
      {id:'d2',name:'Robert Chen',phone:'(555) 345-6789',email:'robert.c@email.com',address:'1201 Elm St',city:'Springfield',state:'IL',value:'$299,000',source:'Calculator',status:'Contacted',notes:'Used net proceeds calculator, followed up',date:'2026-03-25'},
      {id:'d3',name:'Maria Santos',phone:'(555) 456-7890',email:'maria.s@email.com',address:'556 Maple Ave',city:'Rochester',state:'IL',value:'$425,000',source:'Open House',status:'Appointment',notes:'Appointment set for April 2',date:'2026-03-22'},
      {id:'d4',name:'David Kim',phone:'(555) 567-8901',email:'david.k@email.com',address:'89 Pine Ct',city:'Chatham',state:'IL',value:'$275,000',source:'Website',status:'Contacted',notes:'Downloaded market report',date:'2026-03-20'},
      {id:'d5',name:'Amanda Lewis',phone:'(555) 678-9012',email:'amanda.l@email.com',address:'2100 River Rd',city:'Springfield',state:'IL',value:'$510,000',source:'Referral',status:'Listed',notes:'Listed March 15, showing activity strong',date:'2026-03-15'},
      {id:'d6',name:'James O\'Brien',phone:'(555) 789-0123',email:'james.ob@email.com',address:'334 Cedar Ln',city:'Sherman',state:'IL',value:'$320,000',source:'AI Chatbot',status:'New',notes:'Asked about market conditions',date:'2026-03-18'}
    ];

    async function getClerkToken() {
      try {
        if (typeof Clerk !== 'undefined' && Clerk.session) {
          return await Clerk.session.getToken();
        }
      } catch(e) {}
      return null;
    }

    function getLeads() {
      // Synchronous read from cache (renders instantly)
      return [..._leadsCache];
    }

    function saveLeads(leads) {
      _leadsCache = leads;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(leads));
      // Async save to server (fire and forget)
      if (_isAuthenticated) {
        getClerkToken().then(function(token) {
          if (!token) return;
          fetch(WORKER_URL + '/leads', {
            method: 'POST',
            headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'bulk', leads: leads }),
          }).catch(function(err) { console.log('Lead sync error:', err); });
        });
      }
    }

    async function loadLeadsFromServer() {
      var token = await getClerkToken();
      if (!token) return false;
      try {
        var res = await fetch(WORKER_URL + '/leads', {
          method: 'GET',
          headers: { Authorization: 'Bearer ' + token },
        });
        var data = await res.json();
        if (Array.isArray(data) && data.length > 0) {
          _leadsCache = data;
          localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
          return true;
        }
        // Server empty -- check if localStorage has data to migrate
        var local = localStorage.getItem(STORAGE_KEY);
        if (local) {
          var localLeads = JSON.parse(local);
          if (localLeads.length > 0) {
            _leadsCache = localLeads;
            // Migrate localStorage data to server
            await fetch(WORKER_URL + '/leads', {
              method: 'POST',
              headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
              body: JSON.stringify({ action: 'bulk', leads: localLeads }),
            });
            return true;
          }
        }
        // Both empty -- seed with demo data
        _leadsCache = [...DEMO_LEADS];
        localStorage.setItem(STORAGE_KEY, JSON.stringify(DEMO_LEADS));
        await fetch(WORKER_URL + '/leads', {
          method: 'POST',
          headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'bulk', leads: DEMO_LEADS }),
        });
        return true;
      } catch(err) {
        console.log('Server load failed, using localStorage:', err);
        return false;
      }
    }

    function initLeadsFromLocal() {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) {
        _leadsCache = [...DEMO_LEADS];
        localStorage.setItem(STORAGE_KEY, JSON.stringify(DEMO_LEADS));
      } else {
        try { _leadsCache = JSON.parse(raw); } catch(e) { _leadsCache = []; }
      }
    }

    function genId() {
      return 'l' + Date.now() + Math.random().toString(36).substr(2,5);
    }

    function updateCounts() {
      const leads = getLeads();
      document.getElementById('countAll').textContent = leads.length;
      ['New','Contacted','Appointment','Listed','Sold'].forEach(s => {
        document.getElementById('count'+s).textContent = leads.filter(l => l.status === s).length;
      });
    }

    function filterByStatus(status, el) {
      currentFilter = status;
      document.querySelectorAll('.pipe-card').forEach(c => c.classList.remove('active'));
      if (el) el.classList.add('active');
      renderLeads();
    }

    function getStatusClass(status) {
      const map = { 'New': 'status-new', 'Contacted': 'status-contacted', 'Appointment': 'status-appointment', 'Listed': 'status-listed', 'Sold': 'status-sold' };
      return map[status] || 'status-new';
    }

    function renderLeads() {
      const leads = getLeads();
      const list = document.getElementById('leadList');
      let filtered = leads;

      if (currentFilter !== 'All') {
        filtered = filtered.filter(l => l.status === currentFilter);
      }

      if (searchTerm) {
        const q = searchTerm.toLowerCase();
        filtered = filtered.filter(l =>
          (l.name||'').toLowerCase().includes(q) ||
          (l.address||'').toLowerCase().includes(q) ||
          (l.city||'').toLowerCase().includes(q) ||
          (l.notes||'').toLowerCase().includes(q)
        );
      }

      if (filtered.length === 0) {
        list.innerHTML = '<div class="glass-card rounded-2xl p-12 text-center"><i class="ph ph-address-book text-4xl text-white/20 mb-3"></i><p class="text-white/40">No leads found. Click "Add New Lead" to get started.</p></div>';
        return;
      }

      list.innerHTML = filtered.map(l => `
        <div class="lead-card glass-card rounded-xl p-5 flex flex-col sm:flex-row items-start sm:items-center gap-4" onclick="editLead('${l.id}')">
          <span class="inline-block px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wide ${getStatusClass(l.status)}">${esc(l.status)}</span>
          <div class="flex-1 min-w-0">
            <div class="font-bold text-white text-sm">${esc(l.name)}</div>
            <div class="text-white/40 text-xs mt-0.5">${esc(l.address)}${l.city ? ', '+esc(l.city) : ''}${l.state ? ' '+esc(l.state) : ''}</div>
            <div class="text-white/30 text-xs mt-0.5">${esc(l.phone||'')}${l.phone && l.email ? ' / ' : ''}${esc(l.email||'')}</div>
          </div>
          <div class="flex items-center gap-4 flex-wrap">
            <span class="text-cyan-glow font-bold text-sm">${esc(l.value||'')}</span>
            <span class="text-xs text-white/30 px-2 py-1 rounded-lg border border-white/5 bg-white/[0.02]">${esc(l.source||'')}</span>
            <span class="text-white/25 text-xs whitespace-nowrap">${esc(l.date||'')}</span>
          </div>
          <div class="flex gap-2" onclick="event.stopPropagation()">
            <button class="w-8 h-8 rounded-lg border border-white/10 bg-white/[0.02] text-white/40 hover:text-cyan-glow hover:border-cyan-glow/30 transition-all flex items-center justify-center" title="Edit" onclick="editLead('${l.id}')">
              <i class="ph ph-pencil-simple text-sm"></i>
            </button>
            <button class="w-8 h-8 rounded-lg border border-white/10 bg-white/[0.02] text-white/40 hover:text-red-400 hover:border-red-400/30 transition-all flex items-center justify-center" title="Delete" onclick="deleteLead('${l.id}')">
              <i class="ph ph-trash text-sm"></i>
            </button>
          </div>
        </div>
      `).join('');
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function openModal(title) {
      document.getElementById('modalTitle').textContent = title || 'Add New Lead';
      document.getElementById('modalOverlay').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
      document.getElementById('leadForm').reset();
      document.getElementById('leadId').value = '';
    }

    function editLead(id) {
      const leads = getLeads();
      const lead = leads.find(l => l.id === id);
      if (!lead) return;
      document.getElementById('leadId').value = lead.id;
      document.getElementById('fName').value = lead.name || '';
      document.getElementById('fPhone').value = lead.phone || '';
      document.getElementById('fEmail').value = lead.email || '';
      document.getElementById('fAddress').value = lead.address || '';
      document.getElementById('fCity').value = lead.city || '';
      document.getElementById('fState').value = lead.state || '';
      document.getElementById('fValue').value = lead.value || '';
      document.getElementById('fSource').value = lead.source || 'AI Chatbot';
      document.getElementById('fStatus').value = lead.status || 'New';
      document.getElementById('fNotes').value = lead.notes || '';
      openModal('Edit Lead');
    }

    function saveLead(e) {
      e.preventDefault();
      const leads = getLeads();
      const id = document.getElementById('leadId').value;
      const data = {
        name: document.getElementById('fName').value.trim(),
        phone: document.getElementById('fPhone').value.trim(),
        email: document.getElementById('fEmail').value.trim(),
        address: document.getElementById('fAddress').value.trim(),
        city: document.getElementById('fCity').value.trim(),
        state: document.getElementById('fState').value.trim(),
        value: document.getElementById('fValue').value.trim(),
        source: document.getElementById('fSource').value,
        status: document.getElementById('fStatus').value,
        notes: document.getElementById('fNotes').value.trim()
      };

      if (id) {
        const idx = leads.findIndex(l => l.id === id);
        if (idx !== -1) {
          leads[idx] = { ...leads[idx], ...data };
        }
      } else {
        data.id = genId();
        data.date = new Date().toISOString().split('T')[0];
        leads.unshift(data);
      }

      saveLeads(leads);
      closeModal();
      updateCounts();
      renderLeads();
    }

    function deleteLead(id) {
      if (!confirm('Delete this lead? This cannot be undone.')) return;
      let leads = getLeads();
      leads = leads.filter(l => l.id !== id);
      saveLeads(leads);
      updateCounts();
      renderLeads();
    }

    // Scroll reveal observer
    const revealObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
                revealObserver.unobserve(entry.target);
            }
        });
    }, { threshold: 0.1 });

    document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));

    // INIT
    document.getElementById('btnAddNew').addEventListener('click', () => {
      document.getElementById('leadId').value = '';
      document.getElementById('leadForm').reset();
      openModal('Add New Lead');
    });

    document.getElementById('searchInput').addEventListener('input', (e) => {
      searchTerm = e.target.value;
      renderLeads();
    });

    document.getElementById('modalOverlay').addEventListener('click', (e) => {
      if (e.target === document.getElementById('modalOverlay')) closeModal();
    });

    // Load from localStorage first (instant render)
    initLeadsFromLocal();
    updateCounts();
    renderLeads();

    // Then try Clerk auth and load from server
    function tryClerkCRM() {
      if (typeof Clerk === 'undefined') return false;
      try {
        Clerk.load({
          ui: window.__internal_ClerkUICtor ? { ClerkUI: window.__internal_ClerkUICtor } : undefined,
        }).then(function() {
          if (Clerk.user) {
            _isAuthenticated = true;
            loadLeadsFromServer().then(function(loaded) {
              if (loaded) {
                updateCounts();
                renderLeads();
              }
            });
          }
        }).catch(function(err) { console.log('Clerk CRM init:', err); });
        return true;
      } catch(e) { return false; }
    }

    if (!tryClerkCRM()) {
      setTimeout(tryClerkCRM, 2000);
      setTimeout(tryClerkCRM, 5000);
    }
    </script>

</body>
</html>
