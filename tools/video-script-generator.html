<body class="font-sans min-h-screen flex flex-col">
    <nav class="fixed w-full top-0 z-50 glass-panel border-b border-white/5 py-4"><div class="max-w-5xl mx-auto px-6 flex justify-between items-center"><a href="/tools/" class="flex items-center gap-3 group" style="text-decoration:none;"><i class="ph ph-arrow-left text-xl text-cyan-glow/70 group-hover:text-cyan-glow transition-colors"></i><span class="text-sm text-white/50 group-hover:text-white/70 transition-colors hidden sm:inline">All Tools</span></a><a href="/" style="text-decoration:none;"><span class="font-serif text-2xl font-bold tracking-wide text-gradient-brand">HomeEdge</span></a><a href="/app/dashboard.html" class="flex items-center gap-2 text-sm text-white/50 hover:text-white/70 transition-colors" style="text-decoration:none;"><i class="ph ph-squares-four text-lg"></i><span class="hidden sm:inline">Dashboard</span></a></div></nav>

    <section class="relative pt-28 pb-12 px-6 text-center overflow-hidden">
        <div class="orb w-[400px] h-[400px] bg-cyan-glow/5 -top-40 -left-40 absolute"></div><div class="orb w-[300px] h-[300px] bg-gold-base/5 -top-20 -right-32 absolute"></div>
        <div class="relative z-10 max-w-2xl mx-auto reveal"><div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-navy-700/60 border border-white/10 mb-6"><i class="ph ph-video-camera text-3xl text-cyan-glow"></i></div><h1 class="font-serif text-4xl md:text-5xl font-bold mb-4 text-white leading-tight">AI Video Script Generator</h1><p class="text-lg text-white/50 max-w-lg mx-auto">Camera-ready scripts for any platform</p></div>
    </section>

    <main class="flex-1 max-w-3xl w-full mx-auto px-6 pb-20">
        <div class="glass-card rounded-2xl p-8 md:p-10 mb-8 reveal" id="formCard">
            <div class="flex items-center gap-3 mb-4"><div class="w-8 h-8 rounded-lg bg-cyan-glow/10 flex items-center justify-center"><i class="ph ph-lightning text-lg text-cyan-glow"></i></div><h2 class="text-base font-semibold text-white/90 tracking-wide uppercase">Quick Pick</h2></div>
            <div class="flex flex-wrap gap-2 mb-8" id="quickPicks">
                <button class="quick-pick" data-type="Listing Walkthrough">Listing Walkthrough</button>
                <button class="quick-pick" data-type="Market Update">Market Update</button>
                <button class="quick-pick" data-type="Neighborhood Spotlight">Neighborhood Spotlight</button>
                <button class="quick-pick" data-type="Seller Tips">Seller Tips</button>
                <button class="quick-pick" data-type="Just Listed">Just Listed</button>
                <button class="quick-pick" data-type="Just Sold">Just Sold</button>
            </div>
            <div class="flex items-center gap-3 mb-6"><div class="w-8 h-8 rounded-lg bg-gold-base/10 flex items-center justify-center"><i class="ph ph-film-script text-lg text-gold-base"></i></div><h2 class="text-base font-semibold text-white/90 tracking-wide uppercase">Script Details</h2></div>
            <form id="scriptForm" onsubmit="event.preventDefault();generateScript();">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div><label class="block text-sm font-medium text-white/50 mb-2">Video Type <span class="text-cyan-glow">*</span></label><select id="videoType" class="form-input"><option value="">-- Select a type --</option><option value="Listing Walkthrough">Listing Walkthrough</option><option value="Market Update">Market Update</option><option value="Neighborhood Spotlight">Neighborhood Spotlight</option><option value="Seller Tips">Seller Tips</option><option value="Just Listed">Just Listed</option><option value="Just Sold">Just Sold</option></select></div>
                    <div><label class="block text-sm font-medium text-white/50 mb-2">Platform</label><select id="platform" class="form-input"><option value="Instagram Reel (60s)">Instagram Reel (60s)</option><option value="TikTok (60s)">TikTok (60s)</option><option value="YouTube (3-5 min)">YouTube (3-5 min)</option><option value="Instagram Story (30s)">Instagram Story (30s)</option></select></div>
                    <div class="md:col-span-2"><label class="block text-sm font-medium text-white/50 mb-2">Topic / Property Details <span class="text-white/25 font-normal">(optional)</span></label><textarea id="topicDetails" class="form-input" placeholder="e.g. 4 bed / 3 bath in Cedar Park, open-concept kitchen, huge backyard with a pool, listed at $475K"></textarea></div>
                    <div><label class="block text-sm font-medium text-white/50 mb-2">Agent Name <span class="text-cyan-glow">*</span></label><input type="text" id="agentName" class="form-input" placeholder="e.g. Sarah Mitchell" required></div>
                    <div><label class="block text-sm font-medium text-white/50 mb-2">Market / City <span class="text-cyan-glow">*</span></label><input type="text" id="market" class="form-input" placeholder="e.g. Austin, TX" required></div>
                </div>
                <div class="mt-10"><button type="submit" id="generateBtn" class="btn-gold w-full py-4 px-8 rounded-xl font-bold text-base tracking-wide bg-gradient-to-r from-gold-dark via-gold-base to-gold-dark text-navy-900 border border-gold-base/30 hover:shadow-[0_0_30px_rgba(212,175,55,0.25)] hover:-translate-y-0.5 active:translate-y-0 disabled:opacity-40 disabled:cursor-not-allowed disabled:transform-none transition-all duration-300 flex items-center justify-center gap-3"><i class="ph ph-sparkle text-xl"></i> Generate Script</button></div>
            </form>
        </div>

        <div class="hidden" id="loading"><div class="glass-card rounded-2xl p-12 text-center"><div class="flex justify-center gap-3 mb-6"><span class="w-3 h-3 bg-cyan-glow rounded-full animate-bounce-dot dot-delay-1"></span><span class="w-3 h-3 bg-cyan-glow rounded-full animate-bounce-dot dot-delay-2"></span><span class="w-3 h-3 bg-cyan-glow rounded-full animate-bounce-dot dot-delay-3"></span></div><p class="text-white/70 text-base font-medium">Writing your video script...</p><p class="text-white/30 text-sm mt-2">Crafting hooks, talking points, and B-roll suggestions</p></div></div>
        <div class="hidden" id="errorMsg"><div class="rounded-xl border border-red-500/30 bg-red-500/10 p-5 mb-6 flex items-start gap-4"><i class="ph ph-warning-circle text-2xl text-red-400 mt-0.5 flex-shrink-0"></i><p class="text-red-400 font-medium text-sm" id="errorText">Something went wrong. Please try again.</p></div></div>

        <div class="hidden" id="output">
            <div class="glass-card rounded-2xl overflow-hidden">
                <div class="flex items-center justify-between px-8 pt-8 pb-0 flex-wrap gap-4">
                    <div class="flex items-center gap-3"><div class="w-8 h-8 rounded-lg bg-cyan-glow/10 flex items-center justify-center"><i class="ph ph-film-script text-lg text-cyan-glow"></i></div><h2 class="text-lg font-semibold text-white">Your Video Script</h2></div>
                    <button id="btnCopy" onclick="copyScript()" class="flex items-center gap-2 px-5 py-2.5 rounded-lg text-sm font-semibold border border-cyan-glow/30 text-cyan-glow bg-cyan-glow/5 hover:bg-cyan-glow/15 hover:border-cyan-glow/50 transition-all duration-300"><i class="ph ph-copy text-base" id="copyIcon"></i><span id="copyText">Copy Script</span></button>
                </div>
                <div class="px-8 py-8 report-output" id="scriptContent"></div>
                <div class="px-8 pb-8 flex items-center justify-center"><button onclick="resetForm()" class="btn-gold py-3 px-8 rounded-xl font-bold text-sm tracking-wide bg-gradient-to-r from-gold-dark via-gold-base to-gold-dark text-navy-900 border border-gold-base/30 hover:shadow-[0_0_30px_rgba(212,175,55,0.25)] hover:-translate-y-0.5 active:translate-y-0 transition-all duration-300 flex items-center justify-center gap-2"><i class="ph ph-plus text-base"></i> Generate Another</button></div>
            </div>
        </div>
    </main>
    <footer class="text-center py-8 border-t border-white/5"><p class="text-white/25 text-sm">Powered by <a href="https://gethomeedge.com" target="_blank" class="text-gold-base hover:text-gold-light transition-colors font-semibold" style="text-decoration:none;">HomeEdge</a></p></footer>

    <script>
    const revealObserver=new IntersectionObserver((entries)=>{entries.forEach(entry=>{if(entry.isIntersecting){entry.target.classList.add('visible');revealObserver.unobserve(entry.target);}});},{threshold:0.1});document.querySelectorAll('.reveal').forEach(el=>revealObserver.observe(el));

    document.querySelectorAll('.quick-pick').forEach(btn=>{btn.addEventListener('click',function(){document.querySelectorAll('.quick-pick').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.getElementById('videoType').value=btn.getAttribute('data-type');});});
    document.getElementById('videoType').addEventListener('change',function(){const val=this.value;document.querySelectorAll('.quick-pick').forEach(b=>{b.classList.toggle('active',b.getAttribute('data-type')===val);});});

    async function generateScript(){const videoType=document.getElementById('videoType').value;const platform=document.getElementById('platform').value;const topicDetails=document.getElementById('topicDetails').value.trim();const agentName=document.getElementById('agentName').value.trim();const market=document.getElementById('market').value.trim();
    if(!videoType){showError('Please select a video type.');return;}if(!agentName){showError('Please enter your name.');return;}if(!market){showError('Please enter your market or city.');return;}
    let userMessage='Write a complete, camera-ready video script for a real estate agent.\n\nVideo type: '+videoType+'\nPlatform: '+platform+'\nAgent name: '+agentName+'\nMarket: '+market+'\n';if(topicDetails)userMessage+='Topic/Property details: '+topicDetails+'\n';
    userMessage+='\nFormat the script with these clearly labeled sections:\n- [HOOK] the attention-grabbing opening line (first 3 seconds)\n- Talking points with numbered or bulleted lines the agent should say on camera\n- [B-ROLL] suggestions in brackets wherever the agent should cut to footage\n- [CTA] the call-to-action at the end\n- Estimated duration for the full script\n- A suggested background music style or mood\n\nKeep the tone conversational and confident. Write it so the agent can read it almost word-for-word on camera.';

    const btn=document.getElementById('generateBtn');const loading=document.getElementById('loading');const outputArea=document.getElementById('output');const errorEl=document.getElementById('errorMsg');
    btn.disabled=true;loading.classList.remove('hidden');outputArea.classList.add('hidden');errorEl.classList.add('hidden');
    try{const response=await fetch('https://homeedge-chat.moltmind.workers.dev/tool',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:[{role:'user',content:userMessage}],toolType:'videoScript',context:{agentName}})});if(!response.ok)throw new Error('Failed to generate script.');const data=await response.json();const aiText=extractAIText(data);if(!aiText)throw new Error('No content was returned.');
    window._rawScriptText=aiText;document.getElementById('scriptContent').innerHTML=renderMarkdown(aiText);outputArea.classList.remove('hidden');outputArea.scrollIntoView({behavior:'smooth',block:'start'});}catch(err){showError(err.message||'Something went wrong.');}finally{btn.disabled=false;loading.classList.add('hidden');}}

    function extractAIText(data){if(typeof data==='string')return data;if(data.reply)return data.reply;if(data.response)return data.response;if(data.content){if(typeof data.content==='string')return data.content;if(Array.isArray(data.content)){const t=data.content.find(b=>b.type==='text');if(t)return t.text;}}if(data.message){if(typeof data.message==='string')return data.message;if(data.message.content)return data.message.content;}if(data.choices&&data.choices[0]){const c=data.choices[0];if(c.message&&c.message.content)return c.message.content;if(c.text)return c.text;}return JSON.stringify(data);}

    function renderMarkdown(text){let html=text;html=html.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');html=html.replace(/^---+$/gm,'<hr>');html=html.replace(/^### (.+)$/gm,'<h3>$1</h3>');html=html.replace(/^## (.+)$/gm,'<h2>$1</h2>');html=html.replace(/^# (.+)$/gm,'<h1>$1</h1>');html=html.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');html=html.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g,'<em>$1</em>');html=html.replace(/`([^`]+)`/g,'<code style="background:rgba(0,242,254,0.08);color:#00F2FE;padding:2px 6px;border-radius:4px;font-size:0.9em">$1</code>');html=html.replace(/^&gt; (.+)$/gm,'<blockquote style="border-left:3px solid #00F2FE;padding-left:1em;margin:0.8em 0;color:rgba(255,255,255,0.5)">$1</blockquote>');
    html=html.replace(/\[HOOK\]/gi,'<span class="tag-hook">[HOOK]</span>');html=html.replace(/\[B-ROLL\]/gi,'<span class="tag-broll">[B-ROLL]</span>');html=html.replace(/\[B-ROLL:[^\]]*\]/gi,function(m){return '<span class="tag-broll">'+m+'</span>';});html=html.replace(/\[CTA\]/gi,'<span class="tag-cta">[CTA]</span>');html=html.replace(/\[([A-Z][A-Z\s/\-]{1,20})\]/g,function(match,inner){if(/^HOOK$/i.test(inner)||/^B-ROLL/i.test(inner)||/^CTA$/i.test(inner))return match;return '<span class="tag-generic">['+inner+']</span>';});
    html=html.replace(/^[\-\*] (.+)$/gm,'<li>$1</li>');html=html.replace(/((?:<li>.*<\/li>\n?)+)/g,'<ul>$1</ul>');html=html.replace(/^\d+\.\s+(.+)$/gm,'<li>$1</li>');html=html.replace(/\n\n/g,'<br><br>');html=html.replace(/\n/g,'<br>');html=html.replace(/<\/li><br>/g,'</li>');html=html.replace(/<br><li>/g,'<li>');html=html.replace(/<\/ul><br>/g,'</ul>');html=html.replace(/<br><hr>/g,'<hr>');html=html.replace(/<hr><br>/g,'<hr>');return html;}

    function copyScript(){const text=window._rawScriptText;if(!text)return;const btn=document.getElementById("btnCopy");const icon=document.getElementById("copyIcon");const txt=document.getElementById("copyText");navigator.clipboard.writeText(text).then(()=>{btn.classList.remove("border-cyan-glow/30","text-cyan-glow","bg-cyan-glow/5");btn.classList.add("border-green-500/30","text-green-400","bg-green-500/10");icon.className="ph ph-check text-base";txt.textContent="Copied!";setTimeout(()=>{btn.classList.remove("border-green-500/30","text-green-400","bg-green-500/10");btn.classList.add("border-cyan-glow/30","text-cyan-glow","bg-cyan-glow/5");icon.className="ph ph-copy text-base";txt.textContent="Copy Script";},2000);});}

    function showError(message){document.getElementById('errorText').textContent=message;document.getElementById('errorMsg').classList.remove('hidden');setTimeout(()=>document.getElementById('errorMsg').classList.add('hidden'),5000);}
    function resetForm(){document.getElementById('output').classList.add('hidden');document.getElementById('errorMsg').classList.add('hidden');document.getElementById('formCard').scrollIntoView({behavior:'smooth',block:'start'});}
    </script>
