    <script>
    const revealObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => { if (entry.isIntersecting) { entry.target.classList.add('visible'); revealObserver.unobserve(entry.target); } });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));

    const inputs = {
        salePrice: document.getElementById('salePrice'),
        mortgageBalance: document.getElementById('mortgageBalance'),
        state: document.getElementById('state'),
        repairCredits: document.getElementById('repairCredits'),
        liens: document.getElementById('liens'),
        commissionRate: document.getElementById('commissionRate'),
        hoaToggle: document.getElementById('hoaToggle'),
        warrantyToggle: document.getElementById('warrantyToggle'),
    };

    function formatCurrency(value) {
        return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(value);
    }

    function calculateClosingCosts() {
        const salePrice = parseFloat(inputs.salePrice.value) || 0;
        const mortgageBalance = parseFloat(inputs.mortgageBalance.value) || 0;
        const transferTaxRate = parseFloat(inputs.state.value) || 0.001;
        const repairCredits = parseFloat(inputs.repairCredits.value) || 0;
        const liens = parseFloat(inputs.liens.value) || 0;
        const commissionRate = parseFloat(inputs.commissionRate.value) / 100 || 0.05;
        const hoaEnabled = inputs.hoaToggle.getAttribute('data-toggle') === 'true';
        const warrantyEnabled = inputs.warrantyToggle.getAttribute('data-toggle') === 'true';

        const costs = {
            commission: salePrice * commissionRate,
            titleInsurance: salePrice * 0.007,
            escrowFees: salePrice * 0.002,
            transferTax: salePrice * transferTaxRate,
            recordingFees: 150,
            hoaTransfer: hoaEnabled ? 350 : 0,
            proratedPropertyTax: (salePrice * 0.011) / 12,
            homeWarranty: warrantyEnabled ? 500 : 0,
            repairCredits: -repairCredits,
        };

        const totalClosingCosts = Object.values(costs).reduce((a, b) => a + b, 0);
        const netProceeds = salePrice - mortgageBalance - totalClosingCosts - liens;

        return { costs, totalClosingCosts, netProceeds, salePrice, mortgageBalance, liens };
    }

    function renderLineItems() {
        const { costs } = calculateClosingCosts();
        const repairCredits = parseFloat(inputs.repairCredits.value) || 0;
        const liens = parseFloat(inputs.liens.value) || 0;
        const container = document.getElementById('lineItems');

        const items = [
            { name: 'Agent Commission', amount: costs.commission, explanation: 'Real estate agent commission for selling your home. Typically paid by the seller and split between listing and buyer agents.', breakdown: 'Based on ' + (parseFloat(inputs.commissionRate.value) || 5).toFixed(1) + '% of sale price' },
            { name: 'Title Insurance', amount: costs.titleInsurance, explanation: 'Protects the buyer against any title issues that may arise after the sale. This is typically a one-time fee.', breakdown: 'Approximately 0.7% of sale price' },
            { name: 'Escrow Fees', amount: costs.escrowFees, explanation: 'Fee charged by the escrow company to handle funds and documents during closing.', breakdown: 'Approximately 0.2% of sale price' },
            { name: 'Transfer Tax', amount: costs.transferTax, explanation: 'State or local tax on the transfer of property ownership. Rates vary by location.', breakdown: (parseFloat(inputs.state.value) * 100).toFixed(2) + '% based on your state' },
            { name: 'Recording Fees', amount: costs.recordingFees, explanation: 'Fee charged by the county to record the new deed and ownership transfer in public records.', breakdown: 'Flat fee typically $50 to $250' },
        ];

        if (inputs.hoaToggle.getAttribute('data-toggle') === 'true') {
            items.push({ name: 'HOA Transfer Fee', amount: costs.hoaTransfer, explanation: 'One-time fee charged by your HOA to process the transfer of the property.', breakdown: 'Typically $200 to $500 depending on HOA' });
        }

        items.push({ name: 'Prorated Property Tax', amount: costs.proratedPropertyTax, explanation: 'Seller reimburses buyer for property taxes already paid for the portion of the year after closing.', breakdown: 'Estimated as 1 month of annual taxes at 1.1% of home value' });

        if (inputs.warrantyToggle.getAttribute('data-toggle') === 'true') {
            items.push({ name: 'Home Warranty', amount: costs.homeWarranty, explanation: 'Optional protection plan offered by seller to buyer covering major home systems and appliances.', breakdown: 'Typically $400 to $600 for 1-year coverage' });
        }

        items.push({ name: 'Mortgage Payoff', amount: parseFloat(inputs.mortgageBalance.value) || 0, explanation: 'The amount owed on your existing mortgage that must be paid off from sale proceeds.', breakdown: 'Your outstanding loan balance' });

        if (repairCredits > 0) {
            items.push({ name: 'Repair Credits', amount: -repairCredits, explanation: 'Credits offered to buyer for repairs or improvements. Deducted from your proceeds.', breakdown: 'Negotiated amount with buyer' });
        }
        if (liens > 0) {
            items.push({ name: 'Outstanding Liens', amount: liens, explanation: 'Any legal claims against the property that must be satisfied from sale proceeds.', breakdown: 'Must be paid before you receive funds' });
        }

        container.innerHTML = items.map((item, index) =>
            '<div class="line-item border-b border-white/5 last:border-b-0" id="item-' + index + '">' +
                '<div class="flex justify-between items-center px-6 py-4 cursor-pointer hover:bg-white/[0.02] transition-colors" onclick="toggleLineItem(' + index + ')">' +
                    '<span class="text-sm font-medium text-white/80">' + item.name + '</span>' +
                    '<div class="flex items-center gap-3">' +
                        '<span class="text-sm font-bold ' + (item.amount < 0 ? 'text-green-400' : 'text-gold-base') + '">' + formatCurrency(Math.abs(item.amount)) + '</span>' +
                        '<i class="ph ph-caret-down text-white/30 text-sm expand-icon"></i>' +
                    '</div>' +
                '</div>' +
                '<div class="line-item-details">' +
                    '<div class="px-6 pb-4">' +
                        '<p class="text-sm text-white/50 mb-3">' + item.explanation + '</p>' +
                        '<div class="text-xs text-cyan-glow font-semibold mb-1">How it is calculated:</div>' +
                        '<div class="text-sm text-gold-base font-medium">' + item.breakdown + '</div>' +
                    '</div>' +
                '</div>' +
            '</div>'
        ).join('');
    }

    function toggleLineItem(index) {
        document.getElementById('item-' + index).classList.toggle('expanded');
    }

    function renderSummary() {
        const { totalClosingCosts, salePrice, mortgageBalance, liens } = calculateClosingCosts();
        const section = document.getElementById('summarySection');
        let html = '<div class="flex justify-between py-2.5 border-b border-white/5"><span class="text-xs text-white/50">Sale Price</span><span class="text-sm font-semibold text-cyan-glow">' + formatCurrency(salePrice) + '</span></div>';
        html += '<div class="flex justify-between py-2.5 border-b border-white/5"><span class="text-xs text-white/50">Closing Costs</span><span class="text-sm font-semibold text-cyan-glow">' + formatCurrency(totalClosingCosts) + '</span></div>';
        html += '<div class="flex justify-between py-2.5 border-b border-white/5"><span class="text-xs text-white/50">Mortgage Payoff</span><span class="text-sm font-semibold text-cyan-glow">' + formatCurrency(mortgageBalance) + '</span></div>';
        if (liens > 0) {
            html += '<div class="flex justify-between py-2.5 border-b border-white/5"><span class="text-xs text-white/50">Outstanding Liens</span><span class="text-sm font-semibold text-cyan-glow">' + formatCurrency(liens) + '</span></div>';
        }
        html += '<div class="flex justify-between py-3 mt-2 border-t border-cyan-glow/15"><span class="text-sm font-bold text-white">Net Proceeds</span><span class="text-sm font-bold text-gold-base">' + formatCurrency(salePrice - totalClosingCosts - mortgageBalance - liens) + '</span></div>';
        section.innerHTML = html;
    }

    function renderDonutChart() {
        const { costs } = calculateClosingCosts();
        const costItems = [
            { name: 'Commission', value: costs.commission, color: '#00F2FE' },
            { name: 'Title Insurance', value: costs.titleInsurance, color: '#4FACFE' },
            { name: 'Escrow Fees', value: costs.escrowFees, color: '#D4AF37' },
            { name: 'Transfer Tax', value: costs.transferTax, color: '#F8E9A1' },
            { name: 'Other Fees', value: costs.recordingFees + costs.hoaTransfer + costs.proratedPropertyTax + costs.homeWarranty + Math.abs(costs.repairCredits), color: '#4ADE80' },
        ];
        const total = costItems.reduce((sum, item) => sum + item.value, 0);
        let currentAngle = -90;
        const svgNS = 'http://www.w3.org/2000/svg';
        const svg = document.getElementById('donutChart');
        svg.innerHTML = '';

        costItems.forEach((item) => {
            if (item.value <= 0) return;
            const sliceAngle = (item.value / total) * 360;
            const endAngle = currentAngle + sliceAngle;
            const startRad = (currentAngle * Math.PI) / 180;
            const endRad = (endAngle * Math.PI) / 180;
            const x1 = 100 + 80 * Math.cos(startRad);
            const y1 = 100 + 80 * Math.sin(startRad);
            const x2 = 100 + 80 * Math.cos(endRad);
            const y2 = 100 + 80 * Math.sin(endRad);
            const largeArc = sliceAngle > 180 ? 1 : 0;
            const path = document.createElementNS(svgNS, 'path');
            path.setAttribute('d', 'M 100 100 L ' + x1 + ' ' + y1 + ' A 80 80 0 ' + largeArc + ' 1 ' + x2 + ' ' + y2 + ' Z');
            path.setAttribute('fill', item.color);
            path.setAttribute('opacity', '0.7');
            svg.appendChild(path);
            currentAngle = endAngle;
        });

        const circle = document.createElementNS(svgNS, 'circle');
        circle.setAttribute('cx', '100'); circle.setAttribute('cy', '100'); circle.setAttribute('r', '50');
        circle.setAttribute('fill', '#040711');
        svg.appendChild(circle);
    }

    function updateCalculations() {
        document.getElementById('commissionRateValue').textContent = (parseFloat(inputs.commissionRate.value) || 5).toFixed(1) + '%';
        renderLineItems();
        renderSummary();
        renderDonutChart();
        const { netProceeds } = calculateClosingCosts();
        document.getElementById('netProceeds').textContent = formatCurrency(netProceeds);
    }

    function toggleSwitch(toggle) {
        const currentState = toggle.getAttribute('data-toggle') === 'true';
        toggle.setAttribute('data-toggle', !currentState);
        toggle.classList.toggle('active');
        updateCalculations();
    }

    function resetForm() {
        inputs.salePrice.value = 500000;
        inputs.mortgageBalance.value = 300000;
        inputs.state.value = '0.001';
        inputs.repairCredits.value = 0;
        inputs.liens.value = 0;
        inputs.commissionRate.value = 5;
        inputs.hoaToggle.setAttribute('data-toggle', 'false');
        inputs.hoaToggle.classList.remove('active');
        inputs.warrantyToggle.setAttribute('data-toggle', 'false');
        inputs.warrantyToggle.classList.remove('active');
        updateCalculations();
    }

    inputs.salePrice.addEventListener('input', updateCalculations);
    inputs.mortgageBalance.addEventListener('input', updateCalculations);
    inputs.state.addEventListener('change', updateCalculations);
    inputs.repairCredits.addEventListener('input', updateCalculations);
    inputs.liens.addEventListener('input', updateCalculations);
    inputs.commissionRate.addEventListener('input', updateCalculations);
    inputs.hoaToggle.addEventListener('click', () => toggleSwitch(inputs.hoaToggle));
    inputs.warrantyToggle.addEventListener('click', () => toggleSwitch(inputs.warrantyToggle));

    updateCalculations();
    </script>
</body>
</html>
