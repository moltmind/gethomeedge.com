<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeEdge | Links</title>
    <meta name="description" content="HomeEdge - 28 AI tools for real estate agents. Try the free listing generator, see all tools, and join at founders pricing.">
    <link rel="icon" href="/homeedge-logo.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: #040711;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px 60px;
        }
        .hero-bg {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background:
                radial-gradient(ellipse 80% 60% at 50% -10%, rgba(0,242,254,0.1) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 80%, rgba(212,175,55,0.05) 0%, transparent 50%);
        }
        .container {
            position: relative; z-index: 1;
            width: 100%; max-width: 400px;
            display: flex; flex-direction: column; align-items: center; gap: 16px;
        }
        .logo-section {
            text-align: center;
            margin-bottom: 8px;
        }
        .logo-section img {
            width: 64px; height: 64px; border-radius: 16px;
            margin-bottom: 12px;
        }
        .logo-text {
            font-size: 28px; font-weight: 800; letter-spacing: -0.5px;
        }
        .logo-text span { color: #00F2FE; }
        .tagline {
            font-size: 14px; color: #9CA3AF; margin-top: 4px;
        }
        .card {
            width: 100%;
            background: rgba(10, 17, 40, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 24px 20px;
            display: flex; flex-direction: column; gap: 12px;
        }
        .link-btn {
            display: flex; align-items: center; justify-content: center;
            width: 100%;
            padding: 16px 20px;
            border-radius: 12px;
            font-size: 15px; font-weight: 600;
            text-decoration: none;
            transition: transform 0.15s, box-shadow 0.15s;
            cursor: pointer;
            text-align: center;
        }
        .link-btn:active { transform: scale(0.97); }
        .btn-gold {
            background: linear-gradient(135deg, #D4AF37, #A6821A);
            color: #040711;
            box-shadow: 0 4px 20px rgba(212,175,55,0.2);
        }
        .btn-gold:hover { box-shadow: 0 4px 30px rgba(212,175,55,0.35); }
        .btn-outline {
            background: transparent;
            border: 1.5px solid #00F2FE;
            color: #00F2FE;
        }
        .btn-outline:hover { background: rgba(0,242,254,0.08); }
        .social-row {
            display: flex; gap: 12px; justify-content: center;
            margin-top: 4px;
        }
        .social-link {
            display: flex; align-items: center; gap: 8px;
            padding: 12px 20px;
            border-radius: 10px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            color: #D1D5DB;
            font-size: 14px; font-weight: 500;
            text-decoration: none;
            transition: background 0.15s;
        }
        .social-link:hover { background: rgba(255,255,255,0.08); }
        .social-link svg { width: 20px; height: 20px; fill: currentColor; }
        .footer {
            margin-top: 12px;
            font-size: 12px; color: #6B7280;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="hero-bg"></div>
    <div class="container">
        <div class="logo-section">
            <img src="/homeedge-logo.png" alt="HomeEdge">

            <div class="tagline">AI-Powered Seller Tools for Real Estate Agents</div>
        </div>

        <div class="card">
            <a href="/free-listing-generator" class="link-btn btn-gold">

            </a>

            </a>

            <a href="https://buy.stripe.com/8wMg2I9rB0PS7kc9AC" class="link-btn btn-gold">
                Join HomeEdge - Founders Pricing
            </a>
        </div>

        <div class="social-row">
            <a href="https://tiktok.com/@homeedge" class="social-link" target="_blank" rel="noopener">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1v-3.51a6.37 6.37 0 0 0-.79-.05A6.34 6.34 0 0 0 3.15 15a6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.34-6.34V8.76a8.28 8.28 0 0 0 4.76 1.5V6.8a4.84 4.84 0 0 1-1-.11z"/></svg>
                TikTok
            </a>
            <a href="https://x.com/DVNtrading" class="social-link" target="_blank" rel="noopener">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                X
            </a>
        </div>

        <div class="footer">gethomeedge.com</div>
    </div>
</body>
</html>
