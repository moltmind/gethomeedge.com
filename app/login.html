<!--
aesthetic_dna: Premium, High-Trust, Cyber-Elegance
ui_paradigm: Auth gate with centered card
palette: Deep Navy (#040711), Cyan Energy (#00F2FE), Wealth Gold (#D4AF37)
-->
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-X6LMX9VR0Y"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-X6LMX9VR0Y');
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | HomeEdge</title>
    <meta name="description" content="Sign in to your HomeEdge dashboard. Access all your AI-powered real estate tools.">
    <link rel="icon" href="/homeedge-logo.png" type="image/png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        navy: {
                            900: '#040711',
                            800: '#0A1128',
                            700: '#141E3E',
                            600: '#1D2A54',
                        },
                        cyan: {
                            glow: '#00F2FE',
                            deep: '#4FACFE',
                        },
                        gold: {
                            light: '#F8E9A1',
                            base: '#D4AF37',
                            dark: '#A6821A',
                        }
                    },
                    backgroundImage: {
                        'gradient-radial': 'radial-gradient(var(--tw-gradient-stops))',
                        'metallic-gold': 'linear-gradient(135deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C)',
                        'cyan-glow': 'linear-gradient(90deg, #4FACFE 0%, #00F2FE 100%)',
                    },
                }
            }
        }
    </script>

    <!-- =====================================================
         CLERK AUTH SCRIPTS (PLACEHOLDER)
         =====================================================
         After creating your Clerk application at clerk.com:
         1. Go to your Clerk Dashboard > API Keys
         2. Copy your "Publishable Key" (starts with pk_live_ or pk_test_)
         3. Copy your "Frontend API URL" (looks like: https://your-app-name.clerk.accounts.dev)
         4. Replace the URLs and key below with your real values
         ===================================================== -->
    <script defer crossorigin="anonymous"
      src="https://YOUR-CLERK-FRONTEND-API.clerk.accounts.dev/npm/@clerk/ui@1/dist/ui.browser.js"></script>
    <script defer crossorigin="anonymous"
      data-clerk-publishable-key="pk_test_YOUR_KEY_HERE"
      src="https://YOUR-CLERK-FRONTEND-API.clerk.accounts.dev/npm/@clerk/clerk-js@6/dist/clerk.browser.js"></script>

    <style>
        body {
            background-color: #040711;
            color: #ffffff;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #040711; }
        ::-webkit-scrollbar-thumb { background: #141E3E; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #1D2A54; }

        .glass-card {
            background: linear-gradient(180deg, rgba(20, 30, 62, 0.6) 0%, rgba(10, 17, 40, 0.4) 100%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .text-gradient-brand {
            background: linear-gradient(135deg, #00F2FE, #D4AF37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
        }

        /* Clerk component overrides for dark theme */
        .cl-rootBox {
            width: 100%;
        }
        .cl-card {
            background: transparent !important;
            box-shadow: none !important;
            border: none !important;
        }
        .cl-headerTitle, .cl-headerSubtitle {
            display: none !important;
        }

        /* Ambient glow behind the card */
        .ambient-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
    </style>
</head>
<body class="font-sans min-h-screen flex flex-col items-center justify-center relative px-4">

    <!-- Ambient background glows -->
    <div class="ambient-glow bg-cyan-glow top-1/4 left-1/4 -translate-x-1/2 -translate-y-1/2" style="position:fixed;"></div>
    <div class="ambient-glow bg-gold-base top-3/4 right-1/4 translate-x-1/2 translate-y-1/2" style="position:fixed;opacity:0.08;"></div>

    <!-- Subtle grid overlay -->
    <div class="fixed inset-0 pointer-events-none" style="background-image: linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px); background-size: 60px 60px;"></div>

    <!-- Main card -->
    <div class="relative z-10 w-full max-w-md animate-float" style="animation-duration: 8s;">
        <div class="glass-card rounded-2xl p-8 sm:p-10">

            <!-- Logo -->
            <div class="text-center mb-8">
                <a href="https://gethomeedge.com" class="inline-block group">
                    <h1 class="font-serif text-3xl sm:text-4xl font-bold text-gradient-brand tracking-tight">
                        HomeEdge
                    </h1>
                    <div class="h-0.5 w-0 group-hover:w-full bg-cyan-glow mx-auto transition-all duration-500 mt-1 rounded-full"></div>
                </a>
            </div>

            <!-- Welcome heading -->
            <div class="text-center mb-6">
                <h2 class="text-xl sm:text-2xl font-semibold text-white mb-2">Welcome Back</h2>
                <p class="text-sm text-gray-400">Sign in to access your AI-powered seller tools</p>
            </div>

            <!-- Clerk sign-in component mounts here -->
            <div id="clerk-sign-in"></div>

            <!-- Demo mode fallback (shown when Clerk hasn't loaded) -->
            <div id="demo-fallback" class="space-y-4">
                <div class="bg-navy-700/50 border border-cyan-glow/20 rounded-xl p-4 text-center">
                    <i class="ph ph-info text-cyan-glow text-xl mb-2"></i>
                    <p class="text-sm text-gray-300">Authentication is being configured. Check back shortly.</p>
                    <a href="/app/dashboard.html?demo=true"
                       class="inline-block mt-3 px-5 py-2.5 rounded-lg bg-gradient-to-r from-cyan-deep to-cyan-glow text-navy-900 font-semibold text-sm hover:shadow-lg hover:shadow-cyan-glow/20 transition-all duration-300">
                        Preview Dashboard (Demo)
                    </a>
                </div>
            </div>

            <!-- Divider -->
            <div class="flex items-center gap-3 my-6">
                <div class="flex-1 h-px bg-white/10"></div>
                <span class="text-xs text-gray-500 uppercase tracking-wider">or</span>
                <div class="flex-1 h-px bg-white/10"></div>
            </div>

            <!-- Sign up link -->
            <p class="text-center text-sm text-gray-400">
                Don't have an account?
                <a href="/app/signup.html" class="text-cyan-glow hover:text-white font-medium transition-colors duration-200">
                    Sign Up
                </a>
            </p>
        </div>
    </div>

    <!-- Back to home -->
    <a href="https://gethomeedge.com"
       class="relative z-10 mt-6 inline-flex items-center gap-2 text-sm text-gray-500 hover:text-cyan-glow transition-colors duration-200 group">
        <i class="ph ph-arrow-left text-lg group-hover:-translate-x-1 transition-transform duration-200"></i>
        Back to gethomeedge.com
    </a>

    <!-- Footer -->
    <footer class="relative z-10 mt-auto pt-12 pb-6 text-center">
        <p class="text-xs text-gray-600">&copy; 2026 HomeEdge. Powered by HomeEdge.</p>
    </footer>

    <script>
        // Wait for Clerk to load, then handle auth
        let clerkTimeout;

        function initClerkAuth() {
            if (typeof Clerk === 'undefined') return false;

            try {
                Clerk.load({
                    ui: window.__internal_ClerkUICtor ? { ClerkUI: window.__internal_ClerkUICtor } : undefined
                }).then(function() {
                    // Hide demo fallback
                    document.getElementById('demo-fallback').style.display = 'none';

                    // If already signed in, redirect to dashboard
                    if (Clerk.user) {
                        window.location.href = '/app/dashboard.html';
                        return;
                    }

                    // Mount sign-in component
                    Clerk.mountSignIn(document.getElementById('clerk-sign-in'), {
                        appearance: {
                            elements: {
                                rootBox: 'w-full',
                                card: 'bg-transparent shadow-none border-none',
                                formButtonPrimary: 'bg-gradient-to-r from-cyan-500 to-cyan-400 hover:from-cyan-400 hover:to-cyan-300 text-navy-900 font-semibold',
                                formFieldInput: 'bg-navy-700 border-white/10 text-white',
                                formFieldLabel: 'text-gray-400',
                                footerAction: 'hidden',
                            }
                        }
                    });
                }).catch(function(err) {
                    console.warn('Clerk load error:', err);
                });

                return true;
            } catch(e) {
                return false;
            }
        }

        // Try to init Clerk on load
        window.addEventListener('load', function() {
            if (!initClerkAuth()) {
                // Clerk script hasn't loaded (placeholder URLs), show demo fallback
                document.getElementById('demo-fallback').style.display = 'block';
            }

            // Also try after a delay in case scripts are slow
            clerkTimeout = setTimeout(function() {
                initClerkAuth();
            }, 3000);
        });
    </script>
</body>
</html>
